<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>TITULARSE</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --color-oscurisimo: #222;
                --color-oscuro: #444;
                --color-normal: #666;
                --color-iluminado: #aaa;
                --color-iluminadisimo: #ddd;
            }

            body {
                font-family: Helvetica, Arial, sans-serif;
                color: var(--color-normal);
                text-align: left;
                font-size: 100%;
            }
            div#contenedor {
                margin: 1rem auto 5rem auto;
                width: 90%;
                max-width: 720px;
            }

            h1 {
                font-weight: 400;
                font-size: calc(100% + 3vw + 3vh);
                margin-left:-0.2rem;
            }

            h2 {
                margin: 1rem 0 3rem 0;
                font-weight: 400;
                letter-spacing: 0.25rem;
                font-size: calc(100% + 1vw + 1vh);
                color: var(--color-oscuro);
            }

            canvas#myChart{
                margin:3rem 0;
                background:#eee;
                padding:1rem;
            }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>Título</h1>
            <h2>Subtítulo</h2>
            <p>Un breve texto que explique el origen de lo que sigue</p>
            <canvas id="myChart"></canvas>
            <p>Y otro breve texto que invite e reflexionar sobre lo que se presenta arriba.</p>
			
			<object data="viz (1).svg" type="image/svg+xml"></object>
			
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script>
            new Chart(document.getElementById("myChart"), {
                type: "bar",
                data: {
                    labels: ["Leonardo Soto C.", "Felix Maldonado", "Mauricio Vico S.", "Jenny Abud C.", "Patricio Bascuñán C.", "Verónica Ode S."],
                    datasets: [
                        {
                            label: "# cursados",
                            data: [14, 6, 4, 11, 2, 25],
                            borderWidth: 2,
							BackgroundColor:"22f"
                        },
						{
                            label: "# aprobados",
                            data: [18, 9, 3, 2, 0, 12],
                            borderWidth: 2,
							BackgroundColor:"c00"
						}
                    ],
                },
                options: {
                    scales: {
						x: {
							stacked: true
						},
                        y: {
                            beginAtZero: true,
							stacked: true
                        },
                    },
                },
            });
        </script>
    </body>
</html>
